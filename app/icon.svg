<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Background - soft lo-fi cream -->
  <rect width="64" height="64" fill="#ecdfbf" rx="12"/>

  <!-- Coffee mug body - voxel style -->
  <rect x="16" y="20" width="32" height="28" fill="#5A4A3E" rx="4"/>

  <!-- Coffee inside -->
  <rect x="20" y="24" width="24" height="20" fill="#2A1810" rx="2"/>

  <!-- Coffee surface highlight -->
  <ellipse cx="32" cy="26" rx="10" ry="3" fill="#3A2820" opacity="0.5"/>

  <!-- Mug handle -->
  <path d="M48 28 Q56 28 56 34 Q56 40 48 40" stroke="#5A4A3E" stroke-width="6" fill="none" stroke-linecap="round"/>

  <!-- Steam - pixelated lo-fi style -->
  <rect x="26" y="10" width="4" height="6" fill="#D4977B" opacity="0.6" rx="1"/>
  <rect x="34" y="8" width="4" height="8" fill="#D4977B" opacity="0.7" rx="1"/>
  <rect x="30" y="4" width="4" height="6" fill="#D4977B" opacity="0.5" rx="1"/>

  <!-- Rim highlight -->
  <rect x="16" y="20" width="32" height="3" fill="#7A6954" rx="1"/>
</svg>
